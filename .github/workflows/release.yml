name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Visual Studio Build Tools (Windows)
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_build_from_source: true

      - name: Clean ALL build artifacts
        shell: bash
        run: |
          rm -rf build/ dist/ node_modules/.cache/
          npm cache clean --force
          
      - name: Rebuild native modules
        shell: bash
        run: npm run postinstall || true
        continue-on-error: true

      - name: Clean build directory
        shell: bash
        run: rm -rf build/ dist/

      - name: Validate required secrets
        shell: bash
        run: |
          MISSING=()
          [ -z "$VITE_FIREBASE_API_KEY" ]            && MISSING+=("VITE_FIREBASE_API_KEY")
          [ -z "$VITE_FIREBASE_AUTH_DOMAIN" ]        && MISSING+=("VITE_FIREBASE_AUTH_DOMAIN")
          [ -z "$VITE_FIREBASE_PROJECT_ID" ]         && MISSING+=("VITE_FIREBASE_PROJECT_ID")
          [ -z "$VITE_FIREBASE_STORAGE_BUCKET" ]     && MISSING+=("VITE_FIREBASE_STORAGE_BUCKET")
          [ -z "$VITE_FIREBASE_MESSAGING_SENDER_ID" ] && MISSING+=("VITE_FIREBASE_MESSAGING_SENDER_ID")
          [ -z "$VITE_FIREBASE_APP_ID" ]             && MISSING+=("VITE_FIREBASE_APP_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ ERROR: The following required GitHub Secrets are not set:"
            for s in "${MISSING[@]}"; do echo "  - $s"; done
            echo ""
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ All required Firebase secrets are present."
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Build Renderer
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_FIREBASE_FUNCTION_URL: ${{ secrets.VITE_FIREBASE_FUNCTION_URL }}

      - name: Verify build output
        shell: bash
        run: |
          echo "Checking build directory..."
          ls -la build/ || echo "Build directory missing!"
          
      - name: Build Electron App (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
